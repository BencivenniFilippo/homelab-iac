apiVersion: v1
kind: Namespace
metadata:
  name: dns-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blocky-config
  namespace: dns-system
data:
  config.yml: |
    # The external DNS servers to ask if Blocky doesn't know the answer
    upstreams:
      groups:
        default:
          - 1.1.1.1
          - 1.0.0.1
    # Our Split-Horizon DNS overrides!
    customDNS:
      customTTL: 1h
      mapping:
        nextcloud.filippo-homelab.dev: 100.116.119.84
        argocd.local: 100.116.119.84
    # The Ad-Blocking engine
    blocking:
      blackLists:
        default:
          - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
      clientGroupsBlock:
        default:
          - default
    ports:
      dns: 53
      http: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blocky
  namespace: dns-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blocky
  template:
    metadata:
      labels:
        app: blocky
    spec:
      containers:
      - name: blocky
        image: ghcr.io/0xerr0r/blocky:v0.24
        ports:
        - containerPort: 53
          name: dns-tcp
          protocol: TCP
        - containerPort: 53
          name: dns-udp
          protocol: UDP
        volumeMounts:
        - name: config-volume
          mountPath: /app/config.yml
          subPath: config.yml
      volumes:
      - name: config-volume
        configMap:
          name: blocky-config
---
apiVersion: v1
kind: Service
metadata:
  name: blocky
  namespace: dns-system
spec:
  # This attaches Blocky directly to Tailscale
  loadBalancerClass: tailscale
  type: LoadBalancer
  ports:
  - port: 53
    targetPort: 53
    protocol: UDP
    name: dns-udp
  - port: 53
    targetPort: 53
    protocol: TCP
    name: dns-tcp
  selector:
    app: blocky
